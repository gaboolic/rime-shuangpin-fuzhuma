# 对于没有注音的词汇，如 tencent.dict.yaml 词库，
# Rime 按照方案中字表自动注音，多音字的权重比值大于 5:100 的就会参与注音。
# 目前的解决方案，例如「的 de di」，手动注音 di，然后确保字表权重 de * 0.05 > di
#              即手动注音所有发 di 音的词汇，只让 de 参与自动注音。
#              对于「长 chang zhang」这样不易区分的，全部注音并用勤劳的双手完成校对。
